<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workshop Registration Form</title>

<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f0f4f8;
        color: #333c4d;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    .container {
        width: 100%;
        max-width: 420px;
        padding: 30px;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(160, 174, 192, 0.2);
    }

    h2 {
        text-align: center;
        margin-top: 0;
        margin-bottom: 8px;
        color: #4a5568;
        font-size: 24px;
    }

    .subtitle {
        text-align: center;
        font-size: 14px;
        color: #718096;
        margin-bottom: 25px;
    }

    .form-group {
        margin-bottom: 18px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        font-weight: 600;
        color: #4a5568;
    }

    input {
        width: 100%;
        padding: 12px;
        border: 1.5px solid #e2e8f0;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 14px;
        color: #2d3748;
        background-color: #f8fafc;
        transition: all 0.3s ease;
    }

    input:focus {
        outline: none;
        border-color: #7c3aed; /* Soft Tech Purple/Indigo */
        background-color: #fff;
        box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    }

    button {
        width: 100%;
        padding: 12px;
        background: #7c3aed; 
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        margin-top: 10px;
        transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover {
        background: #6d28d9;
    }

    button:active {
        transform: scale(0.98);
    }

    #message {
        margin-top: 18px;
        font-size: 14px;
        font-weight: 500;
        text-align: center;
        padding: 10px;
        border-radius: 6px;
        display: none; /* Hidden by default until activated */
    }

    /* Soft, colorful validation alerts */
    .success {
        display: block !important;
        background-color: #ecfdf5; /* Soft Mint */
        color: #065f46;
        border: 1px solid #a7f3d0;
    }

    .error {
        display: block !important;
        background-color: #fff5f5; /* Soft Coral/Rose */
        color: #9b2c2c;
        border: 1px solid #fed7d7;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Tech Workshop 2026</h2>
    <p class="subtitle">Secure your seat for the upcoming masterclass</p>

    <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="e.g. Jane Doe">
    </div>

    <div class="form-group">
        <label for="age">Age</label>
        <input type="number" id="age" placeholder="Must be 18 or older">
    </div>

    <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="text" id="phone" placeholder="10-digit mobile number">
    </div>

    <div class="form-group">
        <label for="email">Email Address</label>
        <input type="text" id="email" placeholder="name@example.com">
    </div>

    <button id="submitBtn">Complete Registration</button>

    <p id="message"></p>
</div>

<script>
document.getElementById("submitBtn").addEventListener("click", function(){

    let name = document.getElementById("name").value.trim();
    let age = document.getElementById("age").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let email = document.getElementById("email").value.trim();

    let message = document.getElementById("message");

    // Name Validation
    if(name === ""){
        message.textContent = "Name cannot be empty.";
        message.className = "error";
        return;
    }

    if(!/^[A-Za-z ]+$/.test(name)){
        message.textContent = "Name should contain only letters.";
        message.className = "error";
        return;
    }

    // Age Validation
    if(age === "" || age < 18 || age > 100){
        message.textContent = "Age must be between 18 and 100 to register.";
        message.className = "error";
        return;
    }

    // Phone Validation
    if(!/^[0-9]{10}$/.test(phone)){
        message.textContent = "Please enter a valid 10-digit phone number.";
        message.className = "error";
        return;
    }

    // Email Validation
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
        message.textContent = "Please enter a valid email address.";
        message.className = "error";
        return;
    }

    // Success Message
    message.textContent = "Registration Successful! Check your email for details.";
    message.className = "success";

});
</script>

</body>
</html>
